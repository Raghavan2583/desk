# dbt connection profile for DESK — DuckDB (D057: replaced BigQuery).
# Safe to commit — DuckDB needs no credentials.
# Run prod builds with: dbt build --target prod --project-dir dbt --profiles-dir dbt
# DESK_DB_PATH env var sets the DuckDB file path (default: data/desk.duckdb)

desk:
  target: prod
  outputs:
    prod:
      type: duckdb
      path: "{{ env_var('DESK_DB_PATH', 'data/desk.duckdb') }}"
      schema: desk_prod
      threads: 4
