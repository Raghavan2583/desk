name: Daily Pipeline Refresh

on:
  schedule:
    - cron: '7 2 * * *'   # 02:07 UTC daily — off-peak, off the :00/:30 marks
  workflow_dispatch:

concurrency:
  group: desk-pipeline
  cancel-in-progress: false   # queue, never cancel a running pipeline

permissions:
  contents: write

jobs:
  full_refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_DATASET_RAW: desk_raw
      GCP_DATASET_PROD: desk_prod
      GITHUB_TOKENS: '["${{ secrets.GH_TOKEN_1 }}"]'
      PYPI_TOP_N: "1000"
      RISK_SCORE_VERSION: "1"
      PYTHONPATH: ${{ github.workspace }}
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode GCP service account key
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 -d > "$RUNNER_TEMP/gcp-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-key.json" >> "$GITHUB_ENV"

      - name: Ingest — PyPI metadata
        run: python ingestion/pypi_ingest.py

      - name: Ingest — GitHub maintainers
        run: python ingestion/github_ingest.py

      - name: Ingest — OSV CVEs
        continue-on-error: true
        run: python ingestion/osv_ingest.py

      - name: Ingest — deps.dev dependency graph
        run: python ingestion/deps_dev_ingest.py

      - name: Transform — dbt build (prod)
        run: dbt build --target prod --project-dir dbt --profiles-dir dbt

      - name: Score — compute risk scores
        run: python scoring/risk_score.py

      - name: Export — write static graph JSON
        run: python export/graph_export.py

      - name: Commit updated graph data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          git diff --staged --quiet || git commit -m "chore: refresh graph data"
          git pull --rebase origin main
          git push origin HEAD

      - name: Deploy frontend to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: full_refresh
    if: failure()
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "DESK pipeline failed — ${{ github.run_id }}"
          to: raghavan2583@gmail.com
          from: DESK Monitor <${{ secrets.NOTIFY_EMAIL_USER }}>
          body: |
            The DESK daily refresh pipeline failed on ${{ github.run_id }}.

            Check the run: https://github.com/Raghavan2583/desk/actions/runs/${{ github.run_id }}

            Your site data has NOT been updated today. Investigate and re-run manually once fixed:
              gh workflow run daily_refresh.yml

